version: '3'

vars:
  APP_NAME: "obsi-conf-sync"
  BIN_DIR: "bin"
  PACKAGE_MANAGER: '{{.PACKAGE_MANAGER | default "pnpm"}}'
  VITE_PORT: '{{.WAILS_VITE_PORT | default 33005}}'

includes:
  common: ./build/Taskfile.yml
  windows: ./build/windows/Taskfile.yml
  # darwin: ./build/darwin/Taskfile.yml
  # linux: ./build/linux/Taskfile.yml
  # ios: ./build/ios/Taskfile.yml
  # android: ./build/android/Taskfile.yml

tasks:
  dev:
    summary: 开发模式启动 Wails
    dotenv: ['.env.local']
    cmds:
      - wails3 dev -config ./build/config.yml -port {{.VITE_PORT}}

  bindings:
    summary: 重新生成 Wails 前端绑定
    cmds:
      - wails3 generate bindings -ts

  tidy:
    summary: 整理 Go 模块依赖
    cmds:
      - task: common:tidy

  build:
    summary: 构建当前系统版本，Windows 下转到 windows:build
    cmds:
      - task: "{{OS}}:build"

  package:
    summary: 打生产安装包，Windows 下默认生成 NSIS 安装器
    cmds:
      - task: "{{OS}}:package"

  run:
    summary: 运行已构建的程序，Windows 下是 bin/obsi-conf-sync.exe
    cmds:
      - task: "{{OS}}:run"

  setup:docker:
    summary: 构建跨平台编译用 Docker 镜像 wails-cross
    cmds:
      - task: common:setup:docker
